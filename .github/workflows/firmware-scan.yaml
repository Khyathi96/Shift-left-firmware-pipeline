name: Firmware Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:    # lets you trigger manually from the Actions tab

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Locate firmware artifact
        run: |
          FIRMWARE=$(find firmware/ -name "*.squashfs" -o -name "*.bin" -o -name "*.tar.gz" | head -n 1)
          if [ -z "$FIRMWARE" ]; then
            echo "::error::No firmware artifact found in firmware/"
            exit 1
          fi
          echo "Found firmware: $FIRMWARE ($(du -h $FIRMWARE | cut -f1))"
          echo "FIRMWARE_PATH=$FIRMWARE" >> $GITHUB_ENV

      - name: Install extraction tools
        run: |
          sudo apt-get update
          sudo apt-get install -y binwalk squashfs-tools

      - name: Extract firmware filesystem
        run: |
          echo "=== Binwalk signature scan ==="
          binwalk --signature "$FIRMWARE_PATH"

          echo "=== Extracting ==="
          binwalk --extract --directory extracted "$FIRMWARE_PATH"

          ROOTFS=$(find extracted -type d -name "squashfs-root*" | head -n 1)
          if [ -z "$ROOTFS" ]; then
            echo "::error::Extraction produced no root filesystem"
            exit 1
          fi
          echo "Extracted rootfs at: $ROOTFS"
          find "$ROOTFS" | head -40
          echo "ROOTFS_PATH=$ROOTFS" >> $GITHUB_ENV

      - name: Run Firmwalker secret scan
        run: |
          git clone --depth 1 https://github.com/craigz28/firmwalker.git /tmp/firmwalker
          cd /tmp/firmwalker
          bash firmwalker.sh "$GITHUB_WORKSPACE/$ROOTFS_PATH" "$GITHUB_WORKSPACE/firmwalker_output.txt"

          echo "=== Firmwalker findings ==="
          cat "$GITHUB_WORKSPACE/firmwalker_output.txt"

      - name: Upload Firmwalker report
        uses: actions/upload-artifact@v6
        with:
          name: firmwalker-report
          path: firmwalker_output.txt

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy --version

      - name: Trivy CVE scan
        run: |
          trivy rootfs --format json --output trivy-results.json "$ROOTFS_PATH"
          echo "=== Trivy summary (expected: no OS packages detected — opkg unsupported) ==="
          trivy rootfs "$ROOTFS_PATH" || true

      - name: Custom opkg CVE check
        run: |
          bash scripts/opkg_cve_check.sh "$ROOTFS_PATH/usr/lib/opkg/status" opkg_cve_results.json
          echo "=== opkg findings ===" && cat opkg_cve_results.json

      - name: Upload CVE reports
        uses: actions/upload-artifact@v6
        with:
          name: cve-reports
          path: |
            trivy-results.json
            opkg_cve_results.json

      - name: Build unified report
        run: |
          python3 scripts/merge_reports.py firmwalker_output.txt trivy-results.json opkg_cve_results.json hardware_risk_rules.json unified_report.json
          cat unified_report.json

      - name: Upload unified report
        uses: actions/upload-artifact@v6
        with:
          name: unified-security-report
          path: unified_report.json

      - name: Send report to Make.com
        run: |
          curl --fail-with-body -X POST \
            -H "Content-Type: application/json" \
            --data @unified_report.json \
            "$RASHMI_WEBHOOK_URL"

        env:
          RASHMI_WEBHOOK_URL: ${{ secrets.RASHMI_MAKEAI_URL }}